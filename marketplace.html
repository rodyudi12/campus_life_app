<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <title>Marketplace - Campus Life Hub</title>
</head>

<body>
<!-- Header -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="images/logo.png" width="60" class="me-2">
    </a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="events.html">Events</a>
      <a class="text-white me-3" href="dining.html">Dining</a>
      <a class="text-white" href="marketplace.html">Marketplace</a>
    </div>

  </div>
</nav>
<!-- Title -->
<div class="container text-center mt-4">
  <h1>Campus Marketplace</h1>
  <p class="text-muted">Buy and sell items with other students</p>
</div>

<div class="container mt-4">
  <div class="card p-4 shadow-sm">

    <h4>Add an Item</h4>

    <input id="itemName" class="form-control mb-2" placeholder="Item name">
    <input id="itemPrice" class="form-control mb-2" placeholder="Price ($)">
    <input type="file" id="itemImage" class="form-control mb-2" accept="image/*">
    <textarea id="itemDesc" class="form-control mb-2" placeholder="Description"></textarea>

    <button id="addItemBtn" class="btn btn-success">
      Post Item
    </button>

  </div>
</div>

<div class="container mt-4">
  <div id="marketContainer" class="row g-3"></div>
</div>
<!-- Footer  -->
<footer class="bg-dark text-white mt-5 pt-4 pb-3">
  <div class="container text-center">
    <h5>Campus Life Hub</h5>
    <p>&copy; 2026 Campus Life Hub. All rights reserved.</p>
  </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
