<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">

  <title>Login - Campus Life Hub</title>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="images/logo.png" alt="Campus Hub Logo" width="60" class="me-2">
      Campus Hub
    </a>

    <div>
      <a class="text-white me-3" href="index.html">Home</a>
      <a class="text-white me-3" href="events.html">Events</a>
      <a class="text-white me-3" href="dining.html">Dining</a>
      <a class="text-white me-3" href="marketplace.html">Marketplace</a>
      <a class="text-white me-3" id="authBtn" href="login.html">Login/Signup</a>
    </div>

  </div>
</nav>

<!-- HERO -->
<div class="hero text-white d-flex align-items-center justify-content-center">
  <div class="hero-text p-4 text-center">
    <h1>Welcome Back</h1>
    <p>Login to access your account and marketplace</p>
  </div>
</div>

<!-- LOGIN FORM -->
<div class="container mt-5">
  <div class="row justify-content-center">

    <div class="col-md-5">
      <div class="card p-4 shadow-sm">

        <h3 class="text-center mb-3">Login</h3>

        <input id="loginEmail" class="form-control mb-2" placeholder="Email">
        <input id="loginPassword" type="password" class="form-control mb-3" placeholder="Password">

        <button id="loginBtn" class="btn btn-primary w-100">
          Login
        </button>

        <p class="text-center mt-3">
          Don’t have an account?
          <a href="signup.html">Sign up here</a>
        </p>

      </div>
    </div>

  </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-white mt-5 pt-4 pb-3">
  <div class="container text-center">

    <h5>Campus Life Hub</h5>
    <p class="mb-1">Contact: campushub@email.com</p>
    <p class="mb-0">&copy; 2026 Campus Life Hub. All rights reserved.</p>

  </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

</body>
</html>
